name: Deploy RideFlow Backend

on:
  push:
    branches: [backend-deploy]
    paths:
      - "backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Add VM to known_hosts
        run: ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "bash /opt/rideflow/deploy.sh"
